<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9ff"/>
      <stop offset="100%" style="stop-color:#eef1ff"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="50%" style="stop-color:#ff6b81"/>
      <stop offset="100%" style="stop-color:#ffa502;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g fill="#c8cce8" opacity="0.3">
    <circle cx="50" cy="30" r="1.5"/>
    <circle cx="120" cy="60" r="1"/>
    <circle cx="200" cy="20" r="1.2"/>
    <circle cx="300" cy="45" r="1"/>
    <circle cx="650" cy="25" r="1.5"/>
    <circle cx="720" cy="55" r="1"/>
    <circle cx="580" cy="35" r="1.2"/>
    <circle cx="450" cy="15" r="1"/>
    <circle cx="350" cy="170" r="1"/>
    <circle cx="500" cy="175" r="1.2"/>
    <circle cx="680" cy="165" r="1"/>
    <circle cx="750" cy="140" r="1.5"/>
  </g>

  <!-- Rocket -->
  <g transform="translate(80, 35)">
    <!-- Flame -->
    <path d="M30,130 Q35,155 40,170 Q45,155 50,130" fill="url(#flame)" opacity="0.9"/>
    <path d="M33,130 Q37,148 40,158 Q43,148 47,130" fill="#ffd200" opacity="0.8"/>

    <!-- Rocket body -->
    <path d="M20,40 L20,120 Q20,130 30,130 L50,130 Q60,130 60,120 L60,40 Q60,10 40,0 Q20,10 20,40Z" fill="url(#rocket)"/>

    <!-- Window -->
    <circle cx="40" cy="55" r="10" fill="#302b63" stroke="#fff" stroke-width="2"/>
    <circle cx="40" cy="55" r="6" fill="#6c9bff" opacity="0.6"/>

    <!-- Fins -->
    <path d="M20,100 L5,125 L20,120Z" fill="#e67e22"/>
    <path d="M60,100 L75,125 L60,120Z" fill="#e67e22"/>

    <!-- Nose highlight -->
    <path d="M30,15 Q40,5 40,0 Q40,5 50,15" fill="#fff" opacity="0.4"/>
  </g>

  <!-- OfferPilot text -->
  <text x="185" y="105" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#1a1a2e" letter-spacing="-1">
    Offer<tspan fill="#f7971e">Pilot</tspan>
  </text>

  <!-- Tagline -->
  <text x="188" y="145" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#8888aa" letter-spacing="4">
    AI-POWERED INTERVIEW PREP
  </text>

  <!-- Accent line -->
  <line x1="188" y1="118" x2="520" y2="118" stroke="#f7971e" stroke-width="2" opacity="0.5"/>

  <!-- Trajectory dots -->
  <circle cx="155" cy="155" r="2" fill="#f7971e" opacity="0.25"/>
  <circle cx="165" cy="148" r="2.5" fill="#f7971e" opacity="0.35"/>
  <circle cx="175" cy="138" r="3" fill="#f7971e" opacity="0.45"/>
</svg>
